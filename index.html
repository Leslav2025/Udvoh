<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радіо Удвох</title>
    <style>
        /* Базові стилі та фон сторінки */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            /* Синій градієнт з ефектом сяйва */
            background: radial-gradient(circle at top right, #2a5298, #1e3c72);
            background-attachment: fixed;
            color: #333; padding: 40px 0;
        }
        
        /* Сяючий елемент на фоні */
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: rgba(255, 215, 0, 0.1); filter: blur(80px); border-radius: 50%; z-index: -1;
        }

        /* Основна картка плеєра */
        .player-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 85%; max-width: 380px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Стилізація та масштабування логотипа */
        .logo { 
            width: 180px; height: 180px; border-radius: 50%; 
            margin-bottom: 20px; 
            object-fit: cover; /* Заповнює все коло */
            transform: scale(1.3); /* Збільшує малюнок всередині кола */
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: white; /* Щоб фон кола був білим */
        }

        /* Заголовки та тексти */
        h1 { margin: 10px 0 5px 0; font-size: 28px; color: #1e3c72; font-weight: 800; }
        .slogan { color: #555; margin-bottom: 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        /* Аудіоплеєр */
        audio { width: 100%; margin-bottom: 30px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }

        /* Контейнер для кнопок */
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        
        /* Загальний стиль кнопок */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px; color: white; text-decoration: none;
            border-radius: 18px; font-weight: bold; font-size: 16px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Специфічні кольори для соцмереж */
        .btn-blog { background: linear-gradient(to right, #f57d00, #ff9800); }
        .btn-tg { background: linear-gradient(to right, #0088cc, #24A1DE); }
        
        /* Секція донатів */
        .donate-section { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .donate-title { font-size: 12px; font-weight: 800; color: #d32f2f; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Кольори для кнопок донатів */
        .btn-mono { background: #1a1a1a; }
        .btn-privat { background: #74b72e; }
        .btn-idea { background: #ed1c24; }

        /* Ефект наведення на кнопки */
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); opacity: 0.95; }
    </style>
</head>
<body>

<div class="player-card">
    <img src="1774977175491.png" alt="Радіо Удвох" class="logo">
    
    <h1>Радіо Удвох</h1>
    <div class="slogan">Музика для серця ❤️</div>
    
    <audio controls autoplay>
        <source src="https://listen4.myradio24.com/78073" type="audio/mpeg">
    </audio>

    <div class="btn-container">
        <a href="https://radioudvoh.blogspot.com" target="_blank" class="btn btn-blog">🌐 Наш сайт</a>
        <a href="https://t.me/+QVN4bYIrDRRmMGM6" target="_blank" class="btn btn-tg">✈️ Telegram канал</a>
        
        <div class="donate-section">
            <div class="donate-title">ПІДТРИМАТИ ПРОЄКТ</div>
            <a href="https://send.monobank.ua/jar/ALGbQ8CaYU" target="_blank" class="btn btn-mono">🖤 Монобанк</a>
            <a href="https://www.privat24.ua/send/i0qz3" target="_blank" class="btn btn-privat" style="margin: 12px 0;">💚 ПриватБанк</a>
            <a href="https://pay.obank.com.ua/payment?type=skrynka&uuid=4B45E725-F5D1-4BF6-9CDD-2E81C98074C7" target="_blank" class="btn btn-idea">❤️ Ідея Банк</a>
        </div>
    </div>
</div>

</body>
</html>
