<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радіо Удвох</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background: #0f172a; /* Темний солідний фон */
            color: white; padding: 20px 0;
        }

        .player-card { 
            background: #1e293b; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 90%; max-width: 400px;
            border: 1px solid #334155;
        }

        /* Прямокутний логотип як на прикладі */
        .logo-rect { 
            width: 100%; 
            max-width: 320px; 
            height: auto; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        h1 { margin: 0; font-size: 26px; color: #fbbf24; }
        .slogan { color: #94a3b8; margin-bottom: 20px; font-size: 14px; text-transform: uppercase; }
        
        audio { width: 100%; margin-bottom: 25px; height: 45px; }

        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px; color: white; text-decoration: none;
            border-radius: 12px; font-weight: bold; transition: 0.3s;
            background: #334155; border: 1px solid #475569;
        }
        
        .btn:hover { background: #475569; transform: translateY(-2px); }
        .btn-main { background: #fbbf24; color: #0f172a; border: none; }
        .btn-main:hover { background: #f59e0b; }

        .donate-box { 
            margin-top: 25px; 
            padding: 15px; 
            border: 1px dashed #fbbf24; 
            border-radius: 15px; 
            background: rgba(251, 191, 36, 0.05);
        }
        .donate-title { font-size: 13px; color: #fbbf24; margin-bottom: 12px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="player-card">
    <img src="1774985247528.png" alt="Радіо Удвох" class="logo-rect">
    
    <h1>Радіо Удвох</h1>
    <div class="slogan">Музика для серця ❤️</div>
    
    <audio controls>
        <source src="https://listen4.myradio24.com/78073" type="audio/mpeg">
    </audio>

    <div class="btn-container">
        <a href="https://radioudvoh.blogspot.com" target="_blank" class="btn btn-main">🌐 Наш сайт</a>
        <a href="https://t.me/+QVN4bYIrDRRmMGM6" target="_blank" class="btn">✈️ Telegram канал</a>
        
        <div class="donate-box">
            <div class="donate-title">ПІДТРИМАТИ ПРОЄКТ ❤️</div>
            <a href="https://send.monobank.ua/jar/ALGbQ8CaYU" target="_blank" class="btn" style="margin-bottom: 8px;">👍 Через Монобанк</a>
            <a href="https://www.privat24.ua/send/i0qz3" target="_blank" class="btn" style="margin-bottom: 8px;">❤️ Через ПриватБанк</a>
            <a href="https://pay.obank.com.ua/payment?type=skrynka&uuid=4B45E725-F5D1-4BF6-9CDD-2E81C98074C7" target="_blank" class="btn">❤️ Через Ідея Банк</a>
        </div>
    </div>
</div>

</body>
</html>
